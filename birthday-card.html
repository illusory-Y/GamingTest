<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>生日快乐 ❤️</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #ffd6e0, #fef9ff);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      position: relative;
    }

    /* 浮动小装饰 */
    .float-item {
      position: absolute;
      font-size: 28px;
      animation: float 6s ease-in-out infinite;
      z-index: 1;
    }

    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
      50% { transform: translateY(-20px) rotate(10deg); opacity: 1; }
      100% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
    }

    /* 信封容器 */
    .envelope-wrapper {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80vw;
      max-width: 760px;
      aspect-ratio: 1 / 0.7;
      z-index: 10;
    }

    .envelope {
      position: relative;
      width: 100%;
      height: 100%;
      background: #ffccd5;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      transition: all 0.6s ease;
    }

    /* 信封封口 */
    .envelope-flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50%;
      background: #ff8fab;
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      transform-origin: top center;
      transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      z-index: 11;
    }

    /* 锁扣 */
    .lock {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 50px;
      height: 50px;
      background: #ff5e8d;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
      box-shadow: 0 4px 10px rgba(255, 94, 141, 0.4);
      cursor: pointer;
      z-index: 12;
      transition: transform 0.3s ease;
    }
    .lock:hover {
      transform: translate(-50%, -50%) scale(1.1);
    }

    /* 信纸 */
    .letter {
      position: absolute;
      bottom: 0;
      left: 5%;
      width: 90%;
      height: 85%;
      background: #fff;
      border-radius: 12px;
      padding: 30px 20px;
      text-align: center;
      color: #333;
      transform: translateY(100%);
      opacity: 0;
      transition: transform 1s ease, opacity 0.6s ease;
      z-index: 8;
      box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
      overflow-y: auto;
      line-height: 1.8;
    }

    .letter h2 {
      color: #ff5e8d;
      margin-bottom: 16px;
      font-size: 22px;
    }

    .letter p {
      font-size: 16px;
      margin-bottom: 12px;
      color: #555;
    }

    /* 打开状态 */
    .envelope.opened .envelope-flap {
      transform: rotateX(180deg);
    }
    .envelope.opened .lock {
      opacity: 0;
      pointer-events: none;
    }
    .envelope.opened ~ .letter {
      transform: translateY(0);
      opacity: 1;
    }

    /* 爱心飘落 */
    .hearts {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }
    .heart {
      position: absolute;
      color: #ff8fab;
      font-size: 18px;
      animation: fall 4s linear infinite;
    }
    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.8; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    /* 烟花效果 */
    .fireworks {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 20;
      display: none;
    }
    .firework {
      position: absolute;
      width: 8px;
      height: 8px;
      background: #ffd700;
      border-radius: 50%;
      animation: firework 1.2s ease-out forwards;
    }
    @keyframes firework {
      0% { transform: scale(0); opacity: 1; }
      50% { transform: scale(1.5); opacity: 1; }
      100% { transform: scale(0); opacity: 0; }
    }
  </style>
</head>
<body>

<!-- 四周浮动小装饰 -->
<div class="float-item" style="top:10%; left:10%; animation-delay:0s">🐻</div>
<div class="float-item" style="top:15%; left:80%; animation-delay:1s">🐰</div>
<div class="float-item" style="top:70%; left:12%; animation-delay:2s">🎂</div>
<div class="float-item" style="top:80%; left:75%; animation-delay:0.5s">🎈</div>
<div class="float-item" style="top:40%; left:5%; animation-delay:1.5s">⭐</div>
<div class="float-item" style="top:30%; left:85%; animation-delay:2.5s">🍭</div>

<!-- 信封 -->
<div class="envelope-wrapper">
  <div class="envelope" id="envelope">
    <div class="envelope-flap"></div>
    <div class="lock" id="lock">🔒</div>
  </div>

  <!-- 信纸内容 -->
  <div class="letter">
    <h2>亲爱的，生日快乐！🎂</h2>
    <p>你出生的那天，是世界赠予我最珍贵的礼物。</p>
    <p>新的一岁，愿你被温柔以待，眼里有光，心中有爱。</p>
    <p>愿你平安喜乐，万事胜意，所有美好都如约而至。</p>
    <p>岁岁常欢愉，年年皆胜意～</p>
    <p style="margin-top:24px; font-style:italic; color:#ff5e8d">❤️ 永远爱你 / 想你 / 陪你</p>
  </div>
</div>

<!-- 爱心飘落容器 -->
<div class="hearts" id="hearts"></div>

<!-- 烟花容器 -->
<div class="fireworks" id="fireworks"></div>

<script>
  // 1. 开锁动画
  const lock = document.getElementById('lock');
  const envelope = document.getElementById('envelope');
  const fireworks = document.getElementById('fireworks');

  lock.addEventListener('click', () => {
    // 打开信封
    envelope.classList.add('opened');
    lock.innerHTML = '🔓';

    // 显示烟花
    fireworks.style.display = 'block';
    createFireworks();
    setTimeout(() => { fireworks.style.display = 'none'; }, 2000);

    // 播放音效（可选）
    const audio = new Audio('https://cdn.pixabay.com/download/audio/2022/03/15/audio_84901e3b6e.mp3');
    audio.volume = 0.4;
    audio.play().catch(() => {});
  });

  // 2. 生成随机爱心飘落
  function createHearts() {
    const hearts = document.getElementById('hearts');
    const count = 15;
    for (let i=0; i<count; i++) {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.innerHTML = '❤️';
      heart.style.left = Math.random() * 100 + '%';
      heart.style.animationDelay = Math.random() * 4 + 's';
      heart.style.animationDuration = (3 + Math.random() * 3) + 's';
      hearts.appendChild(heart);
    }
  }
  createHearts();

  // 3. 生成烟花
  function createFireworks() {
    const fw = document.getElementById('fireworks');
    fw.innerHTML = '';
    const total = 30;
    for (let i=0; i<total; i++) {
      const f = document.createElement('div');
      f.className = 'firework';
      f.style.left = Math.random() * 100 + '%';
      f.style.top = Math.random() * 60 + '%';
      f.style.background = ['#ffd700','#ff69b4','#fff','#ff1493','#ffff00'][Math.floor(Math.random()*5)];
      f.style.animationDelay = Math.random() * 0.8 + 's';
      fw.appendChild(f);
    }
  }
</script>

</body>
</html>
