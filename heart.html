<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微分粒子动态爱心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            background: radial-gradient(circle, rgba(20,10,20,1) 0%, rgba(0,0,0,1) 100%);
            -webkit-tap-highlight-color: transparent;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>
    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        
        // 设置画布大小为响应式
        function resizeCanvas() {
            // 使用全屏大小
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            canvas.width = width;
            canvas.height = height;
        }
        
        // 初始调整大小
        resizeCanvas();
        
        // 监听窗口大小变化
        window.addEventListener('resize', resizeCanvas);
        
        // 爱心粒子数组
        const particles = [];
        const particleCount = 800; // 增加粒子数量，使爱心更加密集
        
        // 内部小爱心粒子数组
        const innerParticles = [];
        const innerParticleCount = 100; // 内部小爱心粒子数量
        
        // 背景点缀粒子数组
        const backgroundParticles = [];
        const backgroundParticleCount = 300;
        
        // 散景光斑数组
        const bokehParticles = [];
        const bokehCount = 30; // 减少散景光斑数量
        
        // 爱心呼吸动画参数
        let breathScale = 1;
        let breathDirection = 1;
        let breathSpeed = 0.0005; // 进一步降低跳动频率
        
        // 根据屏幕尺寸计算爱心缩放比例
        function getHeartScale() {
            const minDimension = Math.min(canvas.width, canvas.height);
            const baseScale = minDimension / 600;
            return Math.min(baseScale, 1.5);
        }
        
        // 爱心函数
        function heartShape(t) {
            const x = 160 * Math.pow(Math.sin(t), 3);
            const y = -130 * Math.cos(t) + 50 * Math.cos(2 * t) + 20 * Math.cos(3 * t) + 10 * Math.cos(4 * t);
            const scale = getHeartScale();
            return { x: x * scale, y: y * scale };
        }
        
        // 生成柔和的颜色
        function getSoftColor() {
            const colors = [
                `rgba(255, ${180 + Math.floor(Math.random() * 50)}, ${200 + Math.floor(Math.random() * 55)}, ${0.6 + Math.random() * 0.3})`, // 柔粉
                `rgba(${200 + Math.floor(Math.random() * 55)}, ${180 + Math.floor(Math.random() * 50)}, 255, ${0.6 + Math.random() * 0.3})`, // 淡紫
                `rgba(255, ${200 + Math.floor(Math.random() * 55)}, ${180 + Math.floor(Math.random() * 50)}, ${0.6 + Math.random() * 0.3})`, // 香槟金
                `rgba(255, ${230 + Math.floor(Math.random() * 25)}, ${230 + Math.floor(Math.random() * 25)}, ${0.6 + Math.random() * 0.3})`  // 奶白
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }
        
        // 初始化爱心粒子
        for (let i = 0; i < particleCount; i++) {
            // 重点分布在爱心形状的关键区域
            const t = Math.random() * Math.PI * 2;
            const heartPos = heartShape(t);
            particles.push({
                x: heartPos.x + (Math.random() - 0.5) * 40, // 相对坐标
                y: heartPos.y + (Math.random() - 0.5) * 40,
                size: (Math.random() * 1.5 + 0.8) * getHeartScale() * 0.6,
                speedX: (Math.random() - 0.5) * 0.8, // 减慢初始速度
                speedY: (Math.random() - 0.5) * 0.8,
                targetX: heartPos.x, // 相对目标坐标
                targetY: heartPos.y,
                color: getSoftColor(),
                opacity: 0.4 + Math.random() * 0.6, // 增加初始不透明度
                distanceFromCenter: 0
            });
        }
        
        // 内部小爱心3D旋转参数
        let innerRotationX = 0;
        let innerRotationY = 0;
        let innerRotationZ = 0;
        const rotationSpeed = 0.005;
        
        // 初始化内部小爱心粒子
        for (let i = 0; i < innerParticleCount; i++) {
            const t = Math.random() * Math.PI * 2;
            const heartPos = heartShape(t);
            // 缩小爱心大小，使其成为内部小爱心
            const innerScale = 0.4;
            innerParticles.push({
                x: heartPos.x * innerScale, // 相对坐标
                y: heartPos.y * innerScale,
                z: (Math.random() - 0.5) * 50 * getHeartScale(), // 添加z轴坐标
                size: (Math.random() * 1 + 0.5) * getHeartScale() * 0.4,
                speedX: (Math.random() - 0.5) * 0.5, // 更慢的速度
                speedY: (Math.random() - 0.5) * 0.5,
                speedZ: (Math.random() - 0.5) * 0.2, // z轴速度
                targetX: heartPos.x * innerScale, // 相对目标坐标
                targetY: heartPos.y * innerScale,
                targetZ: (Math.random() - 0.5) * 50 * getHeartScale(), // 目标z轴坐标
                color: getSoftColor(),
                opacity: 0.3 + Math.random() * 0.4, // 更低的不透明度
                distanceFromCenter: 0
            });
        }
        
        // 初始化背景点缀粒子
        for (let i = 0; i < backgroundParticleCount; i++) {
            backgroundParticles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: (Math.random() * 1 + 0.5) * getHeartScale() * 0.3, // 减小背景爱心大小
                speedX: (Math.random() - 0.5) * 1.2, // 加快速度
                speedY: (Math.random() - 0.5) * 1.2,
                color: getSoftColor(),
                opacity: 0.4 + Math.random() * 0.5, // 增加不透明度，使底层不那么黑暗
                isExploding: false,
                explosionScale: 1,
                explosionSpeed: 0,
                isHeart: true, // 标记为爱心形状
                // 尾焰效果相关
                trail: []
            });
        }
        
        // 重置背景粒子位置
        function resetParticlePositions() {
            backgroundParticles.forEach(particle => {
                // 从随机位置出现
                particle.x = Math.random() * canvas.width;
                particle.y = Math.random() * canvas.height;
                particle.size = (Math.random() * 1 + 0.5) * getHeartScale() * 0.3; // 减小背景爱心大小
                particle.speedX = (Math.random() - 0.5) * 1.2; // 加快速度
                particle.speedY = (Math.random() - 0.5) * 1.2;
                particle.opacity = 0.4 + Math.random() * 0.5; // 增加不透明度，使底层不那么黑暗
                particle.isExploding = false;
                particle.explosionScale = 1;
                particle.explosionSpeed = 0;
                particle.trail = []; // 初始化尾焰数组
            });
        }
        
        // 初始重置位置
        resetParticlePositions();
        
        // 监听窗口大小变化时重置位置
        window.addEventListener('resize', resetParticlePositions);
        
        // 动画循环
        function animate() {
            // 清空画布
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            

            
            // 计算中心点
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // 更新和绘制背景点缀粒子
            backgroundParticles.forEach(particle => {
                if (particle.isExploding) {
                    // 爆炸动画
                    particle.explosionScale += particle.explosionSpeed;
                    particle.opacity -= 0.03;
                    particle.explosionSpeed += 0.05;
                    
                    if (particle.opacity <= 0) {
                        // 爆炸结束，重置粒子
                        particle.isExploding = false;
                        particle.opacity = 0.4 + Math.random() * 0.5; // 增加不透明度
                        particle.explosionScale = 1;
                        particle.explosionSpeed = 0;
                        // 从随机位置重新出现
                        particle.x = Math.random() * canvas.width;
                        particle.y = Math.random() * canvas.height;
                        particle.speedX = (Math.random() - 0.5) * 1.2; // 加快速度
                        particle.speedY = (Math.random() - 0.5) * 1.2;
                        particle.trail = []; // 重置尾焰数组
                    }
                } else {
                    // 自由移动
                    // 记录当前位置用于尾焰效果
                    particle.trail.push({x: particle.x, y: particle.y, opacity: particle.opacity * 0.7});
                    
                    // 限制尾焰长度
                    if (particle.trail.length > 8) {
                        particle.trail.shift();
                    }
                    
                    particle.x += particle.speedX;
                    particle.y += particle.speedY;
                    
                    // 边界检测 - 如果粒子飞出屏幕，从另一侧重新进入
                    if (particle.x < -50) particle.x = canvas.width + 50;
                    if (particle.x > canvas.width + 50) particle.x = -50;
                    if (particle.y < -50) particle.y = canvas.height + 50;
                    if (particle.y > canvas.height + 50) particle.y = -50;
                    
                    // 与中心爱心的碰撞检测
                    const dx = particle.x - centerX;
                    const dy = particle.y - centerY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const heartSize = 150 * getHeartScale(); // 中心爱心的近似大小
                    
                    if (distance < heartSize) {
                        // 触发爆炸动画
                        particle.isExploding = true;
                        particle.explosionSpeed = 0.1;
                        
                        // 增强中心爱心的呼吸效果（减小动作幅度）
                        breathScale = 1.05;
                        breathSpeed = 0.01;
                        breathDirection = -1;
                    }
                }
                
                // 绘制尾焰效果
                if (!particle.isExploding && particle.trail.length > 1) {
                    ctx.save();
                    ctx.globalAlpha = 0.3;
                    ctx.strokeStyle = particle.color;
                    ctx.lineWidth = particle.size * 0.5;
                    ctx.beginPath();
                    ctx.moveTo(particle.trail[0].x, particle.trail[0].y);
                    for (let i = 1; i < particle.trail.length; i++) {
                        const alpha = 0.3 * (i / particle.trail.length);
                        ctx.globalAlpha = alpha;
                        ctx.lineTo(particle.trail[i].x, particle.trail[i].y);
                    }
                    ctx.stroke();
                    ctx.restore();
                }
                
                // 绘制爱心形状的背景粒子
                ctx.save();
                ctx.globalAlpha = particle.opacity;
                ctx.fillStyle = particle.color;
                ctx.translate(particle.x, particle.y);
                ctx.scale(particle.isExploding ? particle.explosionScale : 1, particle.isExploding ? particle.explosionScale : 1);
                
                // 绘制爱心形状
                ctx.beginPath();
                for (let t = 0; t < Math.PI * 2; t += 0.1) {
                    const heartPos = heartShape(t);
                    const scale = particle.size / 10;
                    const x = heartPos.x * scale;
                    const y = heartPos.y * scale;
                    if (t === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            });
            
            // 更新呼吸动画
            breathScale += breathSpeed * breathDirection;
            if (breathScale > 1.02) { // 减小动作幅度
                breathDirection = -1;
            } else if (breathScale < 0.98) { // 减小动作幅度
                breathDirection = 1;
            }
            

            
            // 保存当前状态
            ctx.save();
            
            // 应用缩放（移除旋转）
            ctx.translate(centerX, centerY);
            ctx.scale(breathScale, breathScale);
            ctx.translate(-centerX, -centerY);
            
            // 更新和绘制爱心粒子
            particles.forEach(particle => {
                // 计算到目标位置的距离
                const dx = particle.targetX - particle.x;
                const dy = particle.targetY - particle.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                // 粒子向目标位置移动
                if (distance > 1) {
                    particle.speedX += dx * 0.0012; // 增加吸引力
                    particle.speedY += dy * 0.0012;
                }
                
                // 速度限制
                const speed = Math.sqrt(particle.speedX * particle.speedX + particle.speedY * particle.speedY);
                if (speed > 1.5) {
                    particle.speedX *= 0.8;
                    particle.speedY *= 0.8;
                }
                
                // 更新位置
                particle.x += particle.speedX;
                particle.y += particle.speedY;
                
                // 计算实际绘制位置（相对坐标 + 中心点）
                const drawX = centerX + particle.x;
                const drawY = centerY + particle.y;
                
                // 计算到中心的距离
                const centerDx = centerX - drawX;
                const centerDy = centerY - drawY;
                particle.distanceFromCenter = Math.sqrt(centerDx * centerDx + centerDy * centerDy);
                
                // 根据距离中心的距离调整透明度
                particle.opacity = 0.9 - (particle.distanceFromCenter / 400) * 0.7;
                if (particle.opacity < 0.3) particle.opacity = 0.3;
                
                // 绘制粒子
                ctx.globalAlpha = particle.opacity;
                ctx.fillStyle = particle.color;
                ctx.beginPath();
                ctx.arc(drawX, drawY, particle.size, 0, Math.PI * 2);
                ctx.fill();
                
                // 随机更新目标位置，使粒子围绕爱心形状运动
                if (Math.random() < 0.003) {
                    const t = Math.random() * Math.PI * 2;
                    const heartPos = heartShape(t);
                    particle.targetX = heartPos.x + (Math.random() - 0.5) * 20; // 减少目标位置的随机性
                    particle.targetY = heartPos.y + (Math.random() - 0.5) * 20;
                }
            });
            
            // 更新内部小爱心的3D旋转角度
            innerRotationX += rotationSpeed * 0.5;
            innerRotationY += rotationSpeed;
            innerRotationZ += rotationSpeed * 0.3;
            
            // 3D旋转函数
            function rotate3D(x, y, z) {
                // 绕X轴旋转
                let cosX = Math.cos(innerRotationX);
                let sinX = Math.sin(innerRotationX);
                let y1 = y * cosX - z * sinX;
                let z1 = y * sinX + z * cosX;
                
                // 绕Y轴旋转
                let cosY = Math.cos(innerRotationY);
                let sinY = Math.sin(innerRotationY);
                let x1 = x * cosY + z1 * sinY;
                let z2 = -x * sinY + z1 * cosY;
                
                // 绕Z轴旋转
                let cosZ = Math.cos(innerRotationZ);
                let sinZ = Math.sin(innerRotationZ);
                let x2 = x1 * cosZ - y1 * sinZ;
                let y2 = x1 * sinZ + y1 * cosZ;
                
                return { x: x2, y: y2, z: z2 };
            }
            
            // 透视投影函数
            function project3D(x, y, z) {
                const fov = 800; // 视场
                const viewDistance = 1000; // 观察距离
                const scale = fov / (viewDistance + z);
                return {
                    x: x * scale + centerX,
                    y: y * scale + centerY,
                    size: scale
                };
            }
            
            // 更新和绘制内部小爱心粒子
            innerParticles.forEach(particle => {
                // 计算到目标位置的距离
                const dx = particle.targetX - particle.x;
                const dy = particle.targetY - particle.y;
                const dz = particle.targetZ - particle.z;
                const distance = Math.sqrt(dx * dx + dy * dy + dz * dz);
                
                // 粒子向目标位置移动
                if (distance > 1) {
                    particle.speedX += dx * 0.001;
                    particle.speedY += dy * 0.001;
                    particle.speedZ += dz * 0.0005;
                }
                
                // 速度限制
                const speed = Math.sqrt(particle.speedX * particle.speedX + particle.speedY * particle.speedY + particle.speedZ * particle.speedZ);
                if (speed > 1) {
                    particle.speedX *= 0.75;
                    particle.speedY *= 0.75;
                    particle.speedZ *= 0.75;
                }
                
                // 更新位置
                particle.x += particle.speedX;
                particle.y += particle.speedY;
                particle.z += particle.speedZ;
                
                // 应用3D旋转
                const rotated = rotate3D(particle.x, particle.y, particle.z);
                
                // 应用透视投影
                const projected = project3D(rotated.x, rotated.y, rotated.z);
                
                // 计算到中心的距离
                const centerDx = centerX - projected.x;
                const centerDy = centerY - projected.y;
                particle.distanceFromCenter = Math.sqrt(centerDx * centerDx + centerDy * centerDy);
                
                // 根据z轴位置和距离中心的距离调整透明度
                const zFactor = (rotated.z + 50) / 100; // z轴位置影响透明度
                particle.opacity = (0.7 - (particle.distanceFromCenter / 200) * 0.5) * zFactor;
                if (particle.opacity < 0.2) particle.opacity = 0.2;
                if (particle.opacity > 0.8) particle.opacity = 0.8;
                
                // 绘制粒子
                ctx.globalAlpha = particle.opacity;
                ctx.fillStyle = particle.color;
                ctx.beginPath();
                ctx.arc(projected.x, projected.y, particle.size * projected.size, 0, Math.PI * 2);
                ctx.fill();
                
                // 随机更新目标位置，使粒子围绕小爱心形状运动
                if (Math.random() < 0.005) {
                    const t = Math.random() * Math.PI * 2;
                    const heartPos = heartShape(t);
                    const innerScale = 0.4;
                    particle.targetX = heartPos.x * innerScale + (Math.random() - 0.5) * 10;
                    particle.targetY = heartPos.y * innerScale + (Math.random() - 0.5) * 10;
                    particle.targetZ = (Math.random() - 0.5) * 50;
                }
            });
            
            // 恢复状态
            ctx.restore();
            ctx.globalAlpha = 1;
            
            // 绘制爱心形状的光晕
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.scale(breathScale * getHeartScale() * 0.4, breathScale * getHeartScale() * 0.4);
            
            // 创建爱心路径
            ctx.beginPath();
            for (let t = 0; t < Math.PI * 2; t += 0.01) {
                const heartPos = heartShape(t);
                if (t === 0) {
                    ctx.moveTo(heartPos.x, heartPos.y);
                } else {
                    ctx.lineTo(heartPos.x, heartPos.y);
                }
            }
            ctx.closePath();
            
            // 创建径向渐变
            const gradient = ctx.createRadialGradient(
                0, 0, 0,
                0, 0, 200
            );
            gradient.addColorStop(0, 'rgba(255, 180, 200, 0.3)');
            gradient.addColorStop(0.5, 'rgba(255, 180, 200, 0.1)');
            gradient.addColorStop(1, 'rgba(255, 180, 200, 0)');
            ctx.fillStyle = gradient;
            ctx.fill();
            
            ctx.restore();
            
            requestAnimationFrame(animate);
        }
        
        // 启动动画
        animate();
    </script>
</body>
</html>
