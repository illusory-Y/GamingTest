<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微分粒子动态爱心</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: radial-gradient(circle, rgba(20,10,20,1) 0%, rgba(0,0,0,1) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>
    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        
        // 设置画布大小
        canvas.width = 800;
        canvas.height = 600;
        
        // 粒子数组
        const particles = [];
        const particleCount = 500; // 减少粒子数量，使爱心轮廓更清晰
        
        // 内部小爱心粒子数组
        const innerParticles = [];
        const innerParticleCount = 100; // 内部小爱心粒子数量
        
        // 背景点缀粒子数组
        const backgroundParticles = [];
        const backgroundParticleCount = 300;
        
        // 散景光斑数组
        const bokehParticles = [];
        const bokehCount = 30; // 减少散景光斑数量
        
        // 爱心呼吸动画参数
        let breathScale = 1;
        let breathDirection = 1;
        let breathSpeed = 0.002;
        
        // 爱心旋转角度
        let rotationAngle = 0;
        
        // 爱心函数
        function heartShape(t) {
            const x = 160 * Math.pow(Math.sin(t), 3);
            const y = -130 * Math.cos(t) + 50 * Math.cos(2 * t) + 20 * Math.cos(3 * t) + 10 * Math.cos(4 * t);
            return { x: x * 1.5, y: y * 1.5 }; // 增大爱心大小，使其形状更明显
        }
        
        // 生成柔和的颜色
        function getSoftColor() {
            const colors = [
                `rgba(255, ${180 + Math.floor(Math.random() * 50)}, ${200 + Math.floor(Math.random() * 55)}, ${0.6 + Math.random() * 0.3})`, // 柔粉
                `rgba(${200 + Math.floor(Math.random() * 55)}, ${180 + Math.floor(Math.random() * 50)}, 255, ${0.6 + Math.random() * 0.3})`, // 淡紫
                `rgba(255, ${200 + Math.floor(Math.random() * 55)}, ${180 + Math.floor(Math.random() * 50)}, ${0.6 + Math.random() * 0.3})`, // 香槟金
                `rgba(255, ${230 + Math.floor(Math.random() * 25)}, ${230 + Math.floor(Math.random() * 25)}, ${0.6 + Math.random() * 0.3})`  // 奶白
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }
        
        // 初始化爱心粒子
        for (let i = 0; i < particleCount; i++) {
            // 重点分布在爱心形状的关键区域
            const t = Math.random() * Math.PI * 2;
            const heartPos = heartShape(t);
            particles.push({
                x: canvas.width / 2 + heartPos.x + (Math.random() - 0.5) * 40, // 减小初始随机范围
                y: canvas.height / 2 + heartPos.y + (Math.random() - 0.5) * 40,
                size: Math.random() * 1.5 + 0.8, // 调整粒子大小
                speedX: (Math.random() - 0.5) * 0.8, // 减慢初始速度
                speedY: (Math.random() - 0.5) * 0.8,
                targetX: canvas.width / 2 + heartPos.x,
                targetY: canvas.height / 2 + heartPos.y,
                color: getSoftColor(),
                opacity: 0.4 + Math.random() * 0.6, // 增加初始不透明度
                distanceFromCenter: 0
            });
        }
        
        // 内部小爱心3D旋转参数
        let innerRotationX = 0;
        let innerRotationY = 0;
        let innerRotationZ = 0;
        const rotationSpeed = 0.005;
        
        // 初始化内部小爱心粒子
        for (let i = 0; i < innerParticleCount; i++) {
            const t = Math.random() * Math.PI * 2;
            const heartPos = heartShape(t);
            // 缩小爱心大小，使其成为内部小爱心
            const innerScale = 0.4;
            innerParticles.push({
                x: heartPos.x * innerScale, // 相对坐标
                y: heartPos.y * innerScale,
                z: (Math.random() - 0.5) * 50, // 添加z轴坐标
                size: Math.random() * 1 + 0.5, // 更小的粒子
                speedX: (Math.random() - 0.5) * 0.5, // 更慢的速度
                speedY: (Math.random() - 0.5) * 0.5,
                speedZ: (Math.random() - 0.5) * 0.2, // z轴速度
                targetX: heartPos.x * innerScale, // 相对目标坐标
                targetY: heartPos.y * innerScale,
                targetZ: (Math.random() - 0.5) * 50, // 目标z轴坐标
                color: getSoftColor(),
                opacity: 0.3 + Math.random() * 0.4, // 更低的不透明度
                distanceFromCenter: 0
            });
        }
        
        // 初始化背景点缀粒子
        for (let i = 0; i < backgroundParticleCount; i++) {
            backgroundParticles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 1.5 + 0.3,
                speedX: (Math.random() - 0.5) * 0.2,
                speedY: (Math.random() - 0.5) * 0.2,
                color: getSoftColor(),
                angle: Math.random() * Math.PI * 2,
                radius: Math.random() * 80 + 30
            });
        }
        
        // 初始化散景光斑
        for (let i = 0; i < bokehCount; i++) {
            bokehParticles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 15 + 5, // 减小散景光斑大小
                opacity: Math.random() * 0.1 + 0.02, // 减小散景光斑不透明度
                color: getSoftColor()
            });
        }
        
        // 动画循环
        function animate() {
            // 清空画布
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制散景光斑
            bokehParticles.forEach(particle => {
                ctx.globalAlpha = particle.opacity;
                ctx.fillStyle = particle.color;
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            
            // 更新和绘制背景点缀粒子
            backgroundParticles.forEach(particle => {
                // 浪漫的圆周运动效果
                particle.angle += 0.005;
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                
                // 粒子围绕中心点做圆周运动，同时缓慢漂移
                particle.x = centerX + Math.cos(particle.angle) * particle.radius + (Math.random() - 0.5) * 0.3;
                particle.y = centerY + Math.sin(particle.angle) * particle.radius + (Math.random() - 0.5) * 0.3;
                
                // 缓慢改变半径，增加运动的变化性
                particle.radius += (Math.random() - 0.5) * 0.1;
                if (particle.radius < 20) particle.radius = 20;
                if (particle.radius > 120) particle.radius = 120;
                
                // 绘制粒子
                ctx.fillStyle = particle.color;
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // 更新呼吸动画
            breathScale += breathSpeed * breathDirection;
            if (breathScale > 1.05) {
                breathDirection = -1;
            } else if (breathScale < 0.95) {
                breathDirection = 1;
            }
            
            // 缓慢旋转
            rotationAngle += 0.0005;
            
            // 保存当前状态
            ctx.save();
            
            // 应用缩放和旋转
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(breathScale, breathScale);
            ctx.rotate(rotationAngle);
            ctx.translate(-canvas.width / 2, -canvas.height / 2);
            
            // 计算中心点
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // 更新和绘制爱心粒子
            particles.forEach(particle => {
                // 计算到目标位置的距离
                const dx = particle.targetX - particle.x;
                const dy = particle.targetY - particle.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                // 计算到中心的距离
                const centerDx = centerX - particle.x;
                const centerDy = centerY - particle.y;
                particle.distanceFromCenter = Math.sqrt(centerDx * centerDx + centerDy * centerDy);
                
                // 粒子向目标位置移动
                if (distance > 1) {
                    particle.speedX += dx * 0.0012; // 增加吸引力
                    particle.speedY += dy * 0.0012;
                }
                
                // 速度限制
                const speed = Math.sqrt(particle.speedX * particle.speedX + particle.speedY * particle.speedY);
                if (speed > 1.5) {
                    particle.speedX *= 0.8;
                    particle.speedY *= 0.8;
                }
                
                // 更新位置
                particle.x += particle.speedX;
                particle.y += particle.speedY;
                
                // 根据距离中心的距离调整透明度
                particle.opacity = 0.9 - (particle.distanceFromCenter / 400) * 0.7;
                if (particle.opacity < 0.3) particle.opacity = 0.3;
                
                // 绘制粒子
                ctx.globalAlpha = particle.opacity;
                ctx.fillStyle = particle.color;
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                ctx.fill();
                
                // 随机更新目标位置，使粒子围绕爱心形状运动
                if (Math.random() < 0.003) {
                    const t = Math.random() * Math.PI * 2;
                    const heartPos = heartShape(t);
                    particle.targetX = centerX + heartPos.x + (Math.random() - 0.5) * 20; // 减少目标位置的随机性
                    particle.targetY = centerY + heartPos.y + (Math.random() - 0.5) * 20;
                }
            });
            
            // 更新内部小爱心的3D旋转角度
            innerRotationX += rotationSpeed * 0.5;
            innerRotationY += rotationSpeed;
            innerRotationZ += rotationSpeed * 0.3;
            
            // 3D旋转函数
            function rotate3D(x, y, z) {
                // 绕X轴旋转
                let cosX = Math.cos(innerRotationX);
                let sinX = Math.sin(innerRotationX);
                let y1 = y * cosX - z * sinX;
                let z1 = y * sinX + z * cosX;
                
                // 绕Y轴旋转
                let cosY = Math.cos(innerRotationY);
                let sinY = Math.sin(innerRotationY);
                let x1 = x * cosY + z1 * sinY;
                let z2 = -x * sinY + z1 * cosY;
                
                // 绕Z轴旋转
                let cosZ = Math.cos(innerRotationZ);
                let sinZ = Math.sin(innerRotationZ);
                let x2 = x1 * cosZ - y1 * sinZ;
                let y2 = x1 * sinZ + y1 * cosZ;
                
                return { x: x2, y: y2, z: z2 };
            }
            
            // 透视投影函数
            function project3D(x, y, z) {
                const fov = 800; // 视场
                const viewDistance = 1000; // 观察距离
                const scale = fov / (viewDistance + z);
                return {
                    x: x * scale + centerX,
                    y: y * scale + centerY,
                    size: scale
                };
            }
            
            // 更新和绘制内部小爱心粒子
            innerParticles.forEach(particle => {
                // 计算到目标位置的距离
                const dx = particle.targetX - particle.x;
                const dy = particle.targetY - particle.y;
                const dz = particle.targetZ - particle.z;
                const distance = Math.sqrt(dx * dx + dy * dy + dz * dz);
                
                // 粒子向目标位置移动
                if (distance > 1) {
                    particle.speedX += dx * 0.001;
                    particle.speedY += dy * 0.001;
                    particle.speedZ += dz * 0.0005;
                }
                
                // 速度限制
                const speed = Math.sqrt(particle.speedX * particle.speedX + particle.speedY * particle.speedY + particle.speedZ * particle.speedZ);
                if (speed > 1) {
                    particle.speedX *= 0.75;
                    particle.speedY *= 0.75;
                    particle.speedZ *= 0.75;
                }
                
                // 更新位置
                particle.x += particle.speedX;
                particle.y += particle.speedY;
                particle.z += particle.speedZ;
                
                // 应用3D旋转
                const rotated = rotate3D(particle.x, particle.y, particle.z);
                
                // 应用透视投影
                const projected = project3D(rotated.x, rotated.y, rotated.z);
                
                // 计算到中心的距离
                const centerDx = centerX - projected.x;
                const centerDy = centerY - projected.y;
                particle.distanceFromCenter = Math.sqrt(centerDx * centerDx + centerDy * centerDy);
                
                // 根据z轴位置和距离中心的距离调整透明度
                const zFactor = (rotated.z + 50) / 100; // z轴位置影响透明度
                particle.opacity = (0.7 - (particle.distanceFromCenter / 200) * 0.5) * zFactor;
                if (particle.opacity < 0.2) particle.opacity = 0.2;
                if (particle.opacity > 0.8) particle.opacity = 0.8;
                
                // 绘制粒子
                ctx.globalAlpha = particle.opacity;
                ctx.fillStyle = particle.color;
                ctx.beginPath();
                ctx.arc(projected.x, projected.y, particle.size * projected.size, 0, Math.PI * 2);
                ctx.fill();
                
                // 随机更新目标位置，使粒子围绕小爱心形状运动
                if (Math.random() < 0.005) {
                    const t = Math.random() * Math.PI * 2;
                    const heartPos = heartShape(t);
                    const innerScale = 0.4;
                    particle.targetX = heartPos.x * innerScale + (Math.random() - 0.5) * 10;
                    particle.targetY = heartPos.y * innerScale + (Math.random() - 0.5) * 10;
                    particle.targetZ = (Math.random() - 0.5) * 50;
                }
            });
            
            // 恢复状态
            ctx.restore();
            ctx.globalAlpha = 1;
            
            // 绘制爱心形状的光晕
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(breathScale * 0.4, breathScale * 0.4);
            ctx.rotate(rotationAngle);
            
            // 创建爱心路径
            ctx.beginPath();
            for (let t = 0; t < Math.PI * 2; t += 0.01) {
                const heartPos = heartShape(t);
                if (t === 0) {
                    ctx.moveTo(heartPos.x, heartPos.y);
                } else {
                    ctx.lineTo(heartPos.x, heartPos.y);
                }
            }
            ctx.closePath();
            
            // 创建径向渐变
            const gradient = ctx.createRadialGradient(
                0, 0, 0,
                0, 0, 200
            );
            gradient.addColorStop(0, 'rgba(255, 180, 200, 0.3)');
            gradient.addColorStop(0.5, 'rgba(255, 180, 200, 0.1)');
            gradient.addColorStop(1, 'rgba(255, 180, 200, 0)');
            ctx.fillStyle = gradient;
            ctx.fill();
            
            ctx.restore();
            
            requestAnimationFrame(animate);
        }
        
        // 启动动画
        animate();
    </script>
</body>
</html>
